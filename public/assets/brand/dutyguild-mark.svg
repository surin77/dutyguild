<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Duty Guild crest</title>
  <desc id="desc">Heraldic crest with a shield, sword, ember star, and ritual glow.</desc>
  <defs>
    <linearGradient id="shieldFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4d28c" />
      <stop offset="36%" stop-color="#d9984f" />
      <stop offset="100%" stop-color="#7f2212" />
    </linearGradient>
    <linearGradient id="bladeFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff8ee" />
      <stop offset="55%" stop-color="#d9c8af" />
      <stop offset="100%" stop-color="#8f7a64" />
    </linearGradient>
    <linearGradient id="guardFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5ddb0" />
      <stop offset="100%" stop-color="#8f4f22" />
    </linearGradient>
    <radialGradient id="haloFill" cx="50%" cy="34%" r="48%">
      <stop offset="0%" stop-color="#f9e5b9" stop-opacity=".92" />
      <stop offset="45%" stop-color="#e0a24a" stop-opacity=".48" />
      <stop offset="100%" stop-color="#e0a24a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="emberFill" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#ffd9a0" />
      <stop offset="58%" stop-color="#d86d34" />
      <stop offset="100%" stop-color="#742010" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" fill-rule="evenodd">
    <circle cx="128" cy="90" r="76" fill="url(#haloFill)" />

    <path
      d="M128 22 201 51v73c0 51-29 93-73 117-44-24-73-66-73-117V51Z"
      fill="url(#shieldFill)"
      stroke="#2a140f"
      stroke-width="10"
      stroke-linejoin="round"
    />
    <path
      d="M128 44 180 65v57c0 35-19 65-52 86-33-21-52-51-52-86V65Z"
      stroke="#fff2de"
      stroke-opacity=".38"
      stroke-width="4"
      stroke-linejoin="round"
    />

    <path
      d="M128 33 134 46 148 47 137 56 140 70 128 63 116 70 119 56 108 47 122 46Z"
      fill="#ffe3a7"
      filter="url(#softGlow)"
    />

    <path
      d="M128 56 142 71 136 148H120L114 71Z"
      fill="url(#bladeFill)"
      stroke="#f4ebd8"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <path d="M127 71h2l-2 72h-1Z" fill="#b49d84" fill-opacity=".75" />

    <path
      d="M90 87c11 8 24 12 38 12s27-4 38-12l8 12c-13 10-29 15-46 15s-33-5-46-15Z"
      fill="url(#guardFill)"
      stroke="#3b1a11"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <circle cx="128" cy="92" r="11" fill="url(#emberFill)" stroke="#3b1a11" stroke-width="3" />

    <path
      d="M128 148c8 0 14 6 14 14v18h-28v-18c0-8 6-14 14-14Z"
      fill="#5b2b17"
      stroke="#2a140f"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <circle cx="128" cy="191" r="12" fill="url(#emberFill)" stroke="#2a140f" stroke-width="3" />
    <path d="M128 176v-18" stroke="#f2dfc5" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
