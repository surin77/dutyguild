apiVersion: apps/v1
kind: Deployment
metadata:
  name: dutyguild
  namespace: dutyguild
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dutyguild
  template:
    metadata:
      labels:
        app: dutyguild
    spec:
      containers:
        - name: dutyguild
          image: ghcr.io/surin77/dutyguild:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: dutyguild-config
            - secretRef:
                name: dutyguild-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              scheme: HTTP
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              scheme: HTTP
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 15
            periodSeconds: 20
