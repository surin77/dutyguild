apiVersion: v1
kind: ConfigMap
metadata:
  name: dutyguild-config
  namespace: dutyguild
data:
  HOST: "0.0.0.0"
  PORT: "3000"
  APP_NAME: "Duty Guild"
  APP_TIMEZONE: "Europe/Samara"
  SESSION_COOKIE_NAME: "dutyguild_session"
  SESSION_TTL_DAYS: "30"
  LOGIN_CODE_TTL_MINUTES: "15"
  DUTY_INTERVAL_DAYS: "14"
  DUTY_TEAM_SIZE: "2"
  PREFERRED_CLEANING_WEEKDAYS: "2,4"
  AUTH_DEBUG_CODES: "false"
  EMAIL_MODE: "smtp"
  EMAIL_FROM: "noreply@dutyguild.ru"
  SMTP_HOST: "smtp.mail.ru"
  SMTP_PORT: "465"
  SMTP_SECURE: "true"
